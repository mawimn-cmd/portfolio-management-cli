<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Management CLI — Process Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1e2e 0%, #252a3a 100%);
      border-bottom: 1px solid #30363d;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #f0f3f6;
    }

    header h1 span {
      color: #7c8aff;
    }

    header .subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }

    .legend {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: #8b949e;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-line {
      width: 28px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-line.route { background: #7c8aff; }
    .legend-line.data { background: #3fb950; }
    .legend-line.prereq { background: #f0883e; border: none; height: 2px; border-top: 2px dashed #f0883e; background: none; }
    .legend-line.chain { background: #bc8cff; }

    main {
      padding: 32px 40px;
    }

    .flow-container {
      position: relative;
      width: 100%;
      overflow-x: auto;
    }

    svg.flow {
      width: 100%;
      min-width: 1200px;
      height: auto;
    }

    /* Tier sections */
    .tier-bg {
      rx: 12;
      ry: 12;
    }

    /* Node styling */
    .node {
      cursor: default;
    }

    .node rect {
      rx: 8;
      ry: 8;
      stroke-width: 1.5;
      transition: filter 0.2s;
    }

    .node:hover rect {
      filter: brightness(1.15);
    }

    .node text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      fill: #f0f3f6;
    }

    .node-label {
      font-size: 12px;
      font-weight: 600;
    }

    .node-sub {
      font-size: 10px;
      fill: #8b949e !important;
    }

    /* Arrows */
    .arrow {
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#arrowhead);
    }

    .arrow.route { stroke: #7c8aff; opacity: 0.6; }
    .arrow.data-write { stroke: #3fb950; opacity: 0.5; stroke-dasharray: none; }
    .arrow.data-read { stroke: #3fb950; opacity: 0.25; stroke-dasharray: 4,3; }
    .arrow.prereq { stroke: #f0883e; opacity: 0.5; stroke-dasharray: 6,4; }
    .arrow.chain { stroke: #bc8cff; opacity: 0.5; }

    /* Phase chain */
    .phase-connector {
      stroke: #bc8cff;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead-purple);
    }

    /* Bottom sections */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
    }

    .info-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
    }

    .info-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f3f6;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-card h3 .icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .chain-list {
      list-style: none;
    }

    .chain-list li {
      padding: 10px 0;
      border-bottom: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chain-list li:last-child {
      border-bottom: none;
    }

    .chain-name {
      font-size: 13px;
      font-weight: 500;
      color: #e1e4e8;
    }

    .chain-flow {
      font-size: 11px;
      color: #7c8aff;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      letter-spacing: 0.3px;
    }

    .prereq-list {
      list-style: none;
    }

    .prereq-list li {
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 13px;
      color: #e1e4e8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prereq-list li:last-child { border-bottom: none; }

    .prereq-arrow {
      color: #f0883e;
      font-family: monospace;
      font-size: 14px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table th {
      text-align: left;
      padding: 8px 10px;
      color: #8b949e;
      font-weight: 500;
      border-bottom: 1px solid #30363d;
    }

    .data-table td {
      padding: 6px 10px;
      color: #e1e4e8;
      border-bottom: 1px solid #21262d;
    }

    .data-table .file { color: #3fb950; font-family: monospace; }
    .data-table .rw { font-size: 10px; color: #8b949e; }

    .import-info {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.7;
    }

    .import-info code {
      background: #21262d;
      color: #bc8cff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
